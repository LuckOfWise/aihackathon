# 単一 PostgreSQL 構成。Solid Queue / Solid Cache / Solid Cable のテーブルも primary に同居。
# 環境変数は development / production のみで参照し、test は socket 既定に委ねる。
default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  host:     <%= ENV["DB_HOST"] %>
  username: <%= ENV["DB_USER"] %>
  password: <%= ENV["DB_PASSWORD"] %>
  database: <%= ENV.fetch("DB_NAME", "aihackathon_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME_TEST", "aihackathon_test") %>

production:
  <<: *default
  host:     <%= ENV["DB_HOST"] %>
  database: aihackathon_production
  username: aihackathon
  password: <%= ENV["AIHACKATHON_DATABASE_PASSWORD"] %>
