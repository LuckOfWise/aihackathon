<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SHINE-MATE — 全日本AIハッカソン 2026</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;600&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css"/>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tweak defaults (kept on disk via the tweaks-panel host protocol) -->
<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "startStage": "hero",
    "luxury": "中間",
    "aiIntensity": 100,
    "particles": true,
    "showChrome": true,
    "goldColor": "#D4AF37"
  }/*EDITMODE-END*/;
</script>

<!-- Components (order matters: leaf → root) -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="FacePlaceholder.jsx"></script>
<script type="text/babel" src="AnalysisOverlay.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel" src="App.jsx"></script>

<style>
  /* Apply gold tweak override */
  body[data-gold]{ /* no-op selector hook */ }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
  // Apply runtime gold color from tweak
  const root = ReactDOM.createRoot(document.getElementById('root'));
  function Root(){
    const [g,setG] = React.useState(TWEAK_DEFAULTS.goldColor);
    React.useEffect(()=>{
      const onMsg = (e)=>{
        if(e?.data?.type==='__edit_mode_set_keys' && e.data.edits?.goldColor){
          setG(e.data.edits.goldColor);
        }
      };
      window.addEventListener('message',onMsg);
      return ()=>window.removeEventListener('message',onMsg);
    },[]);
    React.useEffect(()=>{
      document.documentElement.style.setProperty('--gold', g);
    },[g]);
    return <App/>;
  }
  root.render(<Root/>);
</script>

<!-- Keyboard nav: ← → to step through stages -->
<script>
window.addEventListener('keydown',(e)=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const stages=['hero','upload','analyzing','result','verdict','match'];
  const cur = window.__currentStage;
  if(!cur) return;
  const i = stages.indexOf(cur);
  if(e.key==='ArrowRight' && i<stages.length-1) window.__setStage?.(stages[i+1]);
  if(e.key==='ArrowLeft' && i>0) window.__setStage?.(stages[i-1]);
});
</script>
</body>
</html>
