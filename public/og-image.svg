<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0a02"/>
      <stop offset="40%" stop-color="#050507"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c76b"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#9c7a1f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#d4af37" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#050507" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="315" r="320" fill="url(#glow)"/>

  <g transform="translate(900 315) rotate(45)">
    <rect x="-150" y="-150" width="300" height="300" fill="none" stroke="url(#goldGrad)" stroke-width="6"/>
    <rect x="-100" y="-100" width="200" height="200" fill="none" stroke="#d4af37" stroke-width="2" stroke-opacity="0.55"/>
    <rect x="-50" y="-50" width="100" height="100" fill="none" stroke="#d4af37" stroke-width="1" stroke-opacity="0.35"/>
  </g>
  <circle cx="900" cy="315" r="18" fill="#f5f1e8"/>
  <circle cx="900" cy="315" r="8" fill="#d4af37"/>

  <g font-family="'Noto Serif JP', 'Hiragino Mincho ProN', serif" fill="#f5f1e8">
    <text x="80" y="160" font-size="22" font-family="'JetBrains Mono', ui-monospace, monospace" letter-spacing="6" fill="#d4af37">SHINE-MATE</text>
    <text x="80" y="280" font-size="76" font-weight="500" letter-spacing="4">写真の雰囲気で、</text>
    <text x="80" y="372" font-size="76" font-weight="500" letter-spacing="4">紹介文を 1 枚に。</text>
    <text x="80" y="445" font-size="22" fill="rgba(245,241,232,0.7)" letter-spacing="3">AI が写真の印象から、マッチングアプリで使える</text>
    <text x="80" y="478" font-size="22" fill="rgba(245,241,232,0.7)" letter-spacing="3">あなた自身の自己紹介文を、そっと書き起こします。</text>
    <text x="80" y="572" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace" letter-spacing="4" fill="rgba(245,241,232,0.5)">POWERED BY CLAUDE  ·  ALL-JAPAN AI HACKATHON</text>
  </g>
</svg>
